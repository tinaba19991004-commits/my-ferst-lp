<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P8WGPBHR');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <title>私の最初のLP | GTMテスト</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        h1 { color: #333; }
        .btn { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; font-size: 16px;}
        .btn:hover { background: #0056b3; }
        
        /* 画面切り替え用のスタイル */
        .page-section { display: none; background: #fff; padding: 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .active { display: block; }
        
        /* フォームのスタイル */
        input[type="text"], input[type="email"] { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P8WGPBHR"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- ==========================================
         1. トップページ（初期表示）
    =========================================== -->
    <div id="page-top" class="page-section active">
        <h1>ようこそ、私のLPへ！</h1>
        <p>GitHub Pagesを使って、はじめてのサイトを公開しました。</p>
        <p>※トップページの計測は標準の「Page View」で自動計測されます。</p>
        <br>
        <button class="btn" onclick="switchPage('page-form')">お問い合わせはこちら（フォームへ）</button>
    </div>

    <!-- ==========================================
         2. フォーム入力画面
    =========================================== -->
    <div id="page-form" class="page-section">
        <h1>お問い合わせフォーム</h1>
        <p>必要事項を入力してください。</p>
        
        <div>
            <input type="text" placeholder="お名前（例: テスト 太郎）"><br>
            <input type="email" placeholder="メールアドレス"><br><br>
            <!-- ボタンを押すとサンクスページへ切り替わる -->
            <button class="btn" onclick="switchPage('page-thanks')">送信する</button>
        </div>
        <br>
        <button class="btn" style="background:#6c757d;" onclick="switchPage('page-top')">トップへ戻る</button>
    </div>

    <!-- ==========================================
         3. サンクスページ（完了画面）
    =========================================== -->
    <div id="page-thanks" class="page-section">
        <h1>送信完了</h1>
        <p>お問い合わせありがとうございました！</p>
        <p>※ここで完了のタグが発火します。</p>
        <br>
        <button class="btn" onclick="switchPage('page-top')">トップへ戻る</button>
    </div>

    <!-- ==========================================
         画面切り替えとGTMへのイベント送信スクリプト
    =========================================== -->
    <script>
        function switchPage(targetPageId) {
            // ① すべてのセクションを一旦非表示にする
            document.getElementById('page-top').classList.remove('active');
            document.getElementById('page-form').classList.remove('active');
            document.getElementById('page-thanks').classList.remove('active');

            // ② 指定されたセクションだけを表示する
            document.getElementById(targetPageId).classList.add('active');

            // ③ GTMに画面遷移の合図（カスタムイベント）を送る
            window.dataLayer = window.dataLayer || [];
            
            if (targetPageId === 'page-form') {
                // フォーム画面が開いたときの合図
                window.dataLayer.push({
                    'event': 'form_view'
                });
            } else if (targetPageId === 'page-thanks') {
                // サンクスページが開いたときの合図
                window.dataLayer.push({
                    'event': 'thanks_page_view'
                });
            }
        }
    </script>
</body>
</html>
